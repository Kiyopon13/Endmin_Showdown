<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endmin Showdown - Logic Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="background"></div>
    <div class="animated-bg"></div>

    <nav class="game-navbar">
        <div class="game-navbar-content">
            <button class="btn-back" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                Back
            </button>
            <h2>Logic Game</h2>
            <div class="game-stats-top">
                <span class="stat-item">
                    <i class="fas fa-star"></i>
                    <span id="score">0</span>
                </span>
                <span class="stat-item">
                    <i class="fas fa-layer-group"></i>
                    Level <span id="level">1</span>
                </span>
                <span class="stat-item">
                    <i class="fas fa-clock"></i>
                    <span id="timer">30</span>s
                </span>
            </div>
        </div>
    </nav>

    <div class="game-container">
        <div class="game-content">
            <div id="gameBoard" class="game-board">
                <!-- Logic game grid will be generated here -->
            </div>

            <div class="game-info">
                <div class="info-item">
                    <h3>Objective</h3>
                    <p id="objective">Click the matching patterns to score points</p>
                </div>
                <div class="info-item">
                    <h3>Level</h3>
                    <p><span id="levelDisplay">1</span> / 10</p>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-gradient" onclick="pauseGame()">
                        <i class="fas fa-pause"></i>
                        Pause
                    </button>
                    <button class="btn btn-danger" onclick="quitGame()">
                        <i class="fas fa-times"></i>
                        Quit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Game Over!</h2>
            </div>
            <div class="modal-body">
                <div class="score-display">
                    <p>Final Score</p>
                    <h1 id="finalScore">0</h1>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span>Level Reached</span>
                        <p id="levelReached">1</p>
                    </div>
                    <div class="stat">
                        <span>Time Played</span>
                        <p id="timePlayed">0:00</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-gradient" onclick="restartGame()">
                    <i class="fas fa-redo"></i>
                    Play Again
                </button>
                <button class="btn btn-secondary" onclick="goToDashboard()">
                    <i class="fas fa-home"></i>
                    Dashboard
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
    <script src="js/logic-game.js"></script>
</body>
</html>
