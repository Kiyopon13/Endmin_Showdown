<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endmin Showdown - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="background"></div>
    <div class="animated-bg"></div>
    
    <div class="login-container">
        <div class="glass-card login-card">
            <div class="login-header">
                <i class="fas fa-key"></i>
                <h1>Reset Password</h1>
                <p>Recover your account</p>
            </div>

            <form id="forgotPasswordForm" class="login-form">
                <div class="step" id="step1">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="Enter your email"
                                required
                            >
                        </div>
                    </div>
                    <p class="info-text">
                        <i class="fas fa-info-circle"></i>
                        We'll send you a code to verify your identity
                    </p>
                    <button type="button" class="btn btn-gradient" onclick="sendResetCode()">
                        <span>Send Reset Code</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="step hidden" id="step2">
                    <div class="form-group">
                        <label for="otp">Verification Code</label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-circle"></i>
                            <input 
                                type="text" 
                                id="otp" 
                                name="otp" 
                                placeholder="Enter 6-digit code"
                                maxlength="6"
                                required
                            >
                        </div>
                    </div>
                    <p class="info-text">
                        <i class="fas fa-info-circle"></i>
                        Check your email for the verification code
                    </p>
                    <button type="button" class="btn btn-gradient" onclick="verifyCode()">
                        <span>Verify Code</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="step hidden" id="step3">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="newPassword" 
                                name="newPassword" 
                                placeholder="Enter new password"
                                required
                            >
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="Confirm password"
                                required
                            >
                        </div>
                    </div>
                    <button type="submit" class="btn btn-gradient">
                        <span>Reset Password</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <div class="login-options">
                <a href="index.html" class="register-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>

            <div id="messageBox" class="message-box"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
